apiVersion: v1
kind: Service
metadata:
  name: label-studio-service
  namespace: aislop
  labels:
    app: label-studio
spec:
  selector:
    app: label-studio
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: label-studio
  namespace: aislop
  labels:
    app: label-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: label-studio
  template:
    metadata:
      labels:
        app: label-studio
    spec:
      containers:
        - name: label-studio
          image: heartexlabs/label-studio:latest
          env:
            - name: LABEL_STUDIO_HOST
              value: "http://0.0.0.0:8080"
            - name: LABEL_STUDIO_DEFAULT_USERNAME
              value: "admin"
            - name: LABEL_STUDIO_DEFAULT_PASSWORD
              value: "admin"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: label-studio-data
              mountPath: /label-studio/data
            - name: data-raw
              mountPath: /label-studio/data/images
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: label-studio-data
          persistentVolumeClaim:
            claimName: label-studio-data-pvc
        - name: data-raw
          persistentVolumeClaim:
            claimName: aislop-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: label-studio-data-pvc
  namespace: aislop
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aislop-data-pvc
  namespace: aislop
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aislop-code-pvc
  namespace: aislop
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
