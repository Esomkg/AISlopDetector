# Prometheus + Grafana monitoring stack via kube-prometheus-stack Helm chart
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -n monitoring -f prometheus.yaml

grafana:
  enabled: true
  adminPassword: "admin"
  ingress:
    enabled: true
    hosts:
      - grafana.aislop.example.com
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: aislop
          orgId: 1
          folder: "AISlopDetector"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/aislop

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: "model-server"
        metrics_path: /metrics
        static_configs:
          - targets:
              - "aislop-classifier-predictor-default.aislop.svc.cluster.local:8080"
