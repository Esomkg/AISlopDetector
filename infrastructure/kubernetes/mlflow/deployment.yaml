apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: aislop
  labels:
    app: mlflow-server
spec:
  selector:
    app: mlflow-server
  ports:
    - name: http
      port: 5500
      targetPort: 5500
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: aislop
  labels:
    app: mlflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
    spec:
      containers:
        - name: mlflow
          image: aislopacr.azurecr.io/aislop:latest
          command: ["mlflow"]
          args:
            - "server"
            - "--host=0.0.0.0"
            - "--port=5500"
            - "--backend-store-uri=postgresql+psycopg2://airflow:airflow@airflow-postgresql.aislop.svc.cluster.local/airflow"
            - "--default-artifact-root=/opt/airflow/mlartifacts"
          ports:
            - containerPort: 5500
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /opt/airflow/mlartifacts
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /
              port: 5500
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5500
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  namespace: aislop
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
