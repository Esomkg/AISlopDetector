name: Deploy to AKS

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: aislopacr
  CLUSTER_NAME: aislop-aks
  RESOURCE_GROUP: aislop-detector-rg
  IMAGE_NAME: aislop
  NAMESPACE: aislop

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create namespaces
        run: |
          kubectl apply -f infrastructure/kubernetes/namespaces.yaml

      - name: Deploy MLflow
        run: |
          kubectl apply -f infrastructure/kubernetes/mlflow/deployment.yaml
          kubectl rollout status deployment/mlflow-server -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Deploy Label Studio
        run: |
          kubectl apply -f infrastructure/kubernetes/label-studio/deployment.yaml
          kubectl rollout status deployment/label-studio -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Deploy Airflow
        run: |
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update
          helm upgrade --install airflow apache-airflow/airflow \
            -n ${{ env.NAMESPACE }} \
            -f infrastructure/kubernetes/airflow/deployment.yaml \
            --set images.airflow.repository=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }} \
            --set images.airflow.tag=latest \
            --timeout 10m \
            --wait

      - name: Deploy Prometheus + Grafana
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            -n monitoring \
            -f infrastructure/kubernetes/monitoring/prometheus.yaml \
            --timeout 10m \
            --wait

      - name: Deploy KServe InferenceService
        run: |
          kubectl apply -f infrastructure/kubernetes/kserve/inferenceservice.yaml
          kubectl wait --for=condition=Ready inferenceservice/aislop-classifier -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Deployment summary
        run: |
          echo "=== Deployment Complete ==="
          echo "Services running in namespace: ${{ env.NAMESPACE }}"
          kubectl get all -n ${{ env.NAMESPACE }}
